name: broker-pet-app

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  broker-client:
    build:
      context: ./broker-client
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5174
    depends_on:
      - server
    ports:
      - "5174:5174"
    volumes:
      - ./broker-client:/app
      - broker_client_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

volumes:
  server_node_modules:
  client_node_modules:
  broker_client_node_modules:
